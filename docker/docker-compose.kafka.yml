# Kafka overlay — used by Ch 15 (cross-language KafkaIO) and Ch 16 (exactly-once over Kafka).
# Bring up WITH the core file:
#   docker compose -f docker/docker-compose.yml -f docker/docker-compose.kafka.yml up -d
#   (or ./scripts/up-kafka.sh)
#
# REACHABILITY RULE:
#   - SDK harness containers (Java expansion + Python) reach the broker at  kafka:29092
#   - Your laptop / host tools reach it at                                  localhost:9092
# Using localhost:9092 from inside a harness is the #1 KafkaIO failure.
name: unified-data-pipeline-concepts

services:
  kafka:
    image: confluentinc/cp-kafka:7.7.0
    ports:
      - "${KAFKA_PORT:-9092}:9092" # host access (PLAINTEXT_HOST); in-network listener is kafka:29092
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
